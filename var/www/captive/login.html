<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Log ind</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f6f7f9;
    color: #111827;
}

.wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 36px 16px;
}

.card {
    background: #fff;
    border-radius: 10px;
    padding: 22px;
    border: 1px solid #e5e7eb;
}

h2 {
    margin: 0 0 10px;
    font-size: 18px;
}

.sub {
    margin: 0 0 14px;
    color: #374151;
    font-size: 14px;
    line-height: 1.4;
}

input {
    width: 100%;
    padding: 11px;
    margin-top: 10px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    background: #fff;
}

input:focus {
    outline: 2px solid rgba(17, 24, 39, 0.15);
    border-color: #9ca3af;
}

.error {
    border-color: #ef4444 !important;
    background: #fef2f2;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #111827;
    background: #111827;
    color: #fff;
    font-weight: 650;
    cursor: pointer;
}

button:hover {
    background: #0b1220;
}

.notice {
    font-size: 12px;
    color: #6b7280;
    margin-top: 12px;
}
</style>
</head>

<body>

<div class="wrap">
    <div class="card">
        <h2>Log ind for at komme på nettet</h2>
        <p class="sub">Det her er en demo til festivalen. Brug ikke dine rigtige login-oplysninger.</p>

        <form action="/authorize" method="GET">
            <input type="hidden" name="ap" id="ap">
            <input type="hidden" name="ssid" id="ssid">
            <input type="hidden" name="startTime" id="startTime">

            <input type="text" name="email" placeholder="Navn eller email" autocomplete="off">
            <input type="password" name="password" placeholder="Adgangskode" autocomplete="off">

            <button type="submit">Forbind</button>
        </form>

    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("ap").value = params.get("ap") || "";
document.getElementById("ssid").value = params.get("ssid") || "";

document.getElementById("startTime").value =
    localStorage.getItem("startTime") || Date.now();

// validation
const form = document.querySelector('form');
const emailInput = document.querySelector('input[name="email"]');
const passwordInput = document.querySelector('input[name="password"]');

function showToast(message) {
    const toast = document.createElement('div');
    toast.textContent = message;
    toast.style.cssText = `
        position: fixed; top: 20px; left: 50%;
        transform: translateX(-50%);
        background: #ef4444;
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        z-index: 9999;
        font-size: 14px;
        max-width: calc(100vw - 32px);
        box-sizing: border-box;
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function clearError() {
    this.classList.remove('error');
}

function showError(input, message) {
    input.classList.add('error');
    showToast(message);
    input.focus();
}

if (emailInput && passwordInput) {
    emailInput.addEventListener('input', clearError);
    passwordInput.addEventListener('input', clearError);
}

if (form && emailInput && passwordInput) {
    form.addEventListener('submit', function(e) {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email) {
            e.preventDefault();
            showError(emailInput, 'Skriv venligst et navn eller email');
            return false;
        }

        if (!password) {
            e.preventDefault();
            showError(passwordInput, 'Skriv venligst en adgangskode');
            return false;
        }

        if (password.length < 3) {
            e.preventDefault();
            showError(passwordInput, 'Adgangskoden skal være mindst 3 tegn');
            return false;
        }

        // delay + redirect
        e.preventDefault();
        try {
            const qs = new URLSearchParams(new FormData(form));
            const url = (form.getAttribute('action') || '/authorize') + '?' + qs.toString();
            fetch(url, { method: 'GET', credentials: 'same-origin', cache: 'no-store' }).catch(() => {});
        } catch (err) {
            // ignore
        }

        setTimeout(() => {
            window.location.href = "/success.html";
        }, 1500);
    });
}

</script>

</body>
</html>
