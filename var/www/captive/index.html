<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Gæste-Wi‑Fi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f6f7f9;
    color: #111827;
}

.wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 36px 16px;
}

.card {
    background: #fff;
    border-radius: 10px;
    padding: 22px;
    border: 1px solid #e5e7eb;
}

h1 {
    font-size: 20px;
    margin: 0 0 6px;
    font-weight: 700;
}

p {
    margin: 8px 0;
    color: #374151;
    line-height: 1.45;
    font-size: 14px;
}

.small {
    font-size: 12px;
    color: #6b7280;
    margin-top: 12px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #111827;
    background: #111827;
    color: #fff;
    font-weight: 650;
    cursor: pointer;
}

button:hover {
    background: #0b1220;
}

.meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.meta span {
    font-size: 12px;
    color: #6b7280;
}
</style>
</head>

<body>

<div class="wrap">
    <div class="card">
        <h1>Gæste-Wi‑Fi</h1>
        <p>Robot &amp; Science Festival · Odense</p>
        <p class="small">Tryk på forbind, så sender vi dig videre.</p>

        <button onclick="goNext()">Forbind</button>

        <div class="meta">
            <span>Netværk: RSF_Guest</span>
        </div>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
localStorage.setItem("startTime", Date.now());

function goNext() {
    const url = new URL("/login.html", window.location.origin);

    params.forEach((v, k) => url.searchParams.set(k, v));

    window.location.href = url.toString();
}
</script>

</body>
</html>
